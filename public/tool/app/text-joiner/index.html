<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文本拼接助手</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <style>
        body {
            min-width: 320px;
            padding: 20px;
            background: transparent;
        }

        .tool-shell {
            width: min(1180px, 100%);
            margin: 0 auto;
        }

        .tool-header {
            display: grid;
            min-height: 70px;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 22px;
            border: 1px solid var(--border-color, #dee2e6);
            border-radius: 8px;
            background: var(--card-bg, #ffffff);
        }

        .tool-header h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.3;
        }

        .home-link {
            width: max-content;
            color: inherit;
            text-decoration: none;
        }

        .settings {
            display: grid;
            grid-template-columns: minmax(220px, 360px) auto auto;
            gap: 12px;
            align-items: end;
            margin-top: 20px;
            padding: 18px;
            border: 1px solid var(--border-color, #dee2e6);
            border-radius: 8px;
            background: var(--card-bg, #ffffff);
        }

        .workspace {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .text-panel {
            min-width: 0;
            padding: 18px;
            border: 1px solid var(--border-color, #dee2e6);
            border-radius: 8px;
            background: var(--card-bg, #ffffff);
        }

        .panel-header {
            display: flex;
            min-height: 38px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.3;
        }

        textarea.form-control {
            min-height: 330px;
            resize: vertical;
            font-size: 16px;
            line-height: 1.65;
        }

        #outputText {
            background: var(--input-bg, #f8f9fa);
        }

        .result-status {
            min-height: 24px;
            margin-top: 10px;
            color: var(--muted-color, #6c757d);
            font-size: 14px;
            text-align: right;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .tool-header {
                grid-template-columns: auto 1fr;
                gap: 16px;
            }

            .tool-header h1 {
                text-align: right;
            }

            .settings,
            .workspace {
                grid-template-columns: 1fr;
            }

            .settings .btn {
                width: 100%;
            }

            textarea.form-control {
                min-height: 230px;
            }
        }
    </style>
    <link rel="stylesheet" href="../../../theme.css">
</head>
<body>
    <main class="tool-shell">
        <header class="tool-header">
            <a class="home-link" href="../../../index.html">返回首页</a>
            <h1>文本拼接助手</h1>
        </header>

        <section class="settings" aria-label="拼接设置">
            <div>
                <label class="form-label" for="outputSeparator">输出分隔符</label>
                <input class="form-control" id="outputSeparator" type="text">
            </div>
            <button class="btn btn-secondary" id="joinButton" type="button">拼接</button>
            <button class="btn btn-outline-secondary" id="clearButton" type="button">清空</button>
        </section>

        <div class="workspace">
            <section class="text-panel" aria-labelledby="inputTitle">
                <div class="panel-header">
                    <h2 id="inputTitle">原始文本</h2>
                </div>
                <textarea class="form-control" id="inputText"></textarea>
            </section>

            <section class="text-panel" aria-labelledby="outputTitle">
                <div class="panel-header">
                    <h2 id="outputTitle">拼接结果</h2>
                    <button class="btn btn-outline-secondary" id="copyButton" type="button" disabled>复制</button>
                </div>
                <textarea class="form-control" id="outputText" readonly></textarea>
                <div class="result-status" id="resultStatus" aria-live="polite">0 项</div>
            </section>
        </div>
    </main>

    <script src="./logic.js"></script>
    <script src="./main.js"></script>
</body>
</html>
