<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞行部培训规则速查</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="../../../theme.css">
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="hero-bar">
                <div class="hero-copy">
                    <h1 class="hero-title">飞行部培训规则速查</h1>
                    <p class="hero-subtitle">本页只读取培训皇帝的规则配置和计算核心，用固定案例展示有效期、窗口和续期结果。</p>
                </div>
                <div class="hero-actions">
                    <a class="hero-link" href="./index.html">返回培训皇帝</a>
                    <a class="hero-link" href="../../../index.html">返回首页</a>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <div>
                    <h2 class="section-title">项目规则</h2>
                    <p class="section-intro">以下内容来自当前培训皇帝规则配置。</p>
                </div>
            </div>
            <div class="table-shell">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th>别名</th>
                            <th>规则类型</th>
                            <th>有效期</th>
                            <th>窗口</th>
                            <th>取整</th>
                        </tr>
                    </thead>
                    <tbody id="projectBody"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <div>
                    <h2 class="section-title">Excel 填写规范</h2>
                    <p class="section-intro">这些是填表口径提示，规则计算仍以培训皇帝核心配置为准。</p>
                </div>
            </div>
            <div class="table-shell">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>场景</th>
                            <th>填写方式</th>
                        </tr>
                    </thead>
                    <tbody id="excelGuideBody"></tbody>
                </table>
            </div>
        </section>

        <div id="caseSections"></div>
    </main>

    <script src="./scripts/config.js"></script>
    <script src="./scripts/utils.js"></script>
    <script src="./scripts/rule-engine.js"></script>
    <script src="./scripts/rule-reference.js"></script>
</body>
</html>
