<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姓名匹配员工号</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <style>
        body { background: transparent; padding: 20px; }
        .table-header { display: flex; justify-content: flex-start; align-items: center; background: #f8f9fa; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px 6px 0 0; border-bottom: none; gap: 12px; }
        .table-header span { font-weight: 600; font-size: 14px; }
        .table-container { border: 1px solid #dee2e6; border-radius: 0 0 6px 6px; max-height: 300px; overflow-y: auto; }
        .table-container table { width: 100%; border-collapse: collapse; }
        .table-container td { padding: 8px 12px; border-bottom: 1px solid #dee2e6; font-size: 14px; }
        .table-container tr:last-child td { border-bottom: none; }
        .table-container tr.selected { background: #e7f1ff; }
        .table-container td:first-child { width: 30px; }
        .no-result { text-align: center; padding: 40px 20px; color: #6c757d; font-size: 14px; }
        #fileStatus { padding: 8px 12px; border-radius: 6px; font-size: 12px; display: none; }
        @media (max-width: 768px) {
            .row { flex-direction: column; }
        }
    </style>
    <link rel="stylesheet" href="../../../theme.css">
</head>
<body>
    <div class="container">
        <div class="card mb-4">
            <div class="card-body text-center position-relative">
                <a href="../../../index.html" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-decoration-none">返回首页</a>
                <h4 class="card-title mb-0">姓名匹配员工号</h4>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title border-bottom pb-2 mb-3">导入员工数据</h5>
                <div class="d-flex align-items-center gap-3">
                    <span id="fileStatus"></span>
                    <label class="btn btn-outline-secondary" style="cursor:pointer;">
                        重新选择文件
                        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
                    </label>
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-3 border-bottom pb-2 mb-3">
                    <h5 class="card-title mb-0">输入文本</h5>
                    <div class="d-flex gap-2">
                        <button id="searchBtn" class="btn btn-outline-secondary" disabled>查询匹配</button>
                        <button id="clearBtn" class="btn btn-outline-secondary">清空输入</button>
                    </div>
                </div>
                <textarea id="textInput" class="form-control" rows="8" placeholder="请在此处粘贴或输入包含员工姓名的文本内容..."></textarea>
            </div>
        </div>
            
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-3 border-bottom pb-2 mb-3">
                    <h5 class="card-title mb-0">匹配结果</h5>
                    <div class="d-flex flex-wrap justify-content-end gap-2">
                        <button id="copyNameBtn" class="btn btn-outline-secondary">复制姓名列</button>
                        <button id="copyIdBtn" class="btn btn-outline-secondary">复制员工号列</button>
                        <button id="copyDepartmentBtn" class="btn btn-outline-secondary">复制分部列</button>
                        <button id="copyTechInfoBtn" class="btn btn-outline-secondary">复制技术信息列</button>
                        <button id="copyTechLevelBtn" class="btn btn-outline-secondary">复制技术等级列</button>
                        <button id="exportExcelBtn" class="btn btn-secondary">导出Excel</button>
                    </div>
                </div>
                <div id="resultArea">
                    <div class="table-header">
                        <span style="width:30px"><input type="checkbox" id="selectAll" title="全选"></span>
                        <span style="flex:1">姓名</span>
                        <span style="flex:1">员工号</span>
                        <span style="flex:1">分部</span>
                        <span style="flex:1">技术信息</span>
                        <span style="flex:1">技术等级</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <tbody id="resultBody">
                                <tr><td colspan="6" class="no-result">匹配结果将显示在这里...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-2 text-muted small">
                    <span id="countInfo">匹配到 0 个员工</span>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title border-bottom pb-2 mb-3">使用说明</h5>
                <p>从混杂着机组姓名的文本中提取姓名并匹配员工号。</p>
                <ol class="text-muted">
                    <li>导入员工花名册Excel，必须包含“员工号”“姓名”“分部”列，支持“技术信息”列</li>
                    <li>将文本粘贴到输入框</li>
                    <li>点击"查询匹配"</li>
                    <li>技术等级列会自动从技术信息提取（如 C / E / A1 / A2）</li>
                    <li>点击复制按钮或导出Excel（有选中的只处理选中的，没选中则处理全部）</li>
                </ol>
            </div>
        </div>
    </div>

<script src="../../../libs/xlsx.full.min.js"></script>
<script src="logic.js"></script>
<script src="main.js"></script>
</body>
</html>
