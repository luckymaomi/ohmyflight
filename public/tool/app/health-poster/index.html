<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康宣教海报</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <style>
        body { background: transparent; padding: 20px; }
        .container-fluid { max-width: 1480px; }
        .template-swatch {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            flex: 0 0 auto;
            background:
                linear-gradient(135deg, var(--swatch-a) 0 48%, transparent 48%),
                linear-gradient(45deg, var(--swatch-b) 0 52%, var(--swatch-c) 52%);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        .poster-frame {
            width: 378px;
            height: 672px;
            flex: 0 0 auto;
        }
        .poster-scale {
            width: 1080px;
            height: 1920px;
            transform: scale(0.35);
            transform-origin: top left;
        }

        .poster {
            --poster-primary: #19324a;
            --poster-secondary: #4f7fa5;
            --poster-accent: #e36f2c;
            --poster-bg: #f4f7fa;
            position: relative;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: var(--poster-bg);
            color: var(--poster-primary);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            letter-spacing: 0;
        }
        .poster-bg-pattern {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .poster-header,
        .poster-points,
        .poster-footer {
            position: relative;
            z-index: 1;
        }
        .poster-header {
            height: 500px;
            padding: 54px 76px 0;
        }
        .poster-logo {
            width: 170px;
            height: auto;
            display: block;
        }
        .title-block {
            margin-top: 92px;
        }
        .title-block h1 {
            margin: 0;
            font-size: 78px;
            line-height: 1.12;
            font-weight: 900;
            color: var(--poster-primary);
        }
        .subtitle-line {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 34px;
        }
        .subtitle-line p {
            margin: 0;
            font-size: 34px;
            line-height: 1.3;
            color: #172c3e;
            font-weight: 800;
        }
        .subtitle-mark {
            width: 74px;
            height: 22px;
            border-radius: 999px;
            background: var(--poster-accent);
            display: inline-block;
            flex: 0 0 auto;
        }
        .poster-points {
            height: 1290px;
            margin: 0 76px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .poster-point {
            position: relative;
            min-height: 0;
            flex: 1 1 0;
            display: grid;
            grid-template-columns: 238px minmax(0, 1fr);
            align-items: stretch;
        }
        .point-number {
            position: absolute;
            left: 0;
            top: -18px;
            font-size: 142px;
            line-height: 1;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.72);
            z-index: 0;
        }
        .point-label {
            align-self: center;
            justify-self: start;
            z-index: 2;
            min-width: 210px;
            padding: 18px 24px;
            background: var(--poster-accent);
            color: #fff;
            font-size: 34px;
            line-height: 1;
            font-weight: 900;
            text-align: center;
        }
        .point-content {
            min-width: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.94);
            padding: 38px 48px;
            box-shadow: 0 14px 28px rgba(28, 45, 61, 0.1);
            border-top: 7px solid var(--poster-accent);
        }
        .point-content h2 {
            margin: 0 0 18px;
            font-size: 34px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--poster-primary);
        }
        .point-content p {
            margin: 0;
            font-size: 24px;
            line-height: 1.65;
            color: #304457;
        }
        .poster-footer {
            position: absolute;
            left: 76px;
            right: 76px;
            bottom: 44px;
            height: 2px;
            background: rgba(25, 50, 74, 0.22);
        }

        .poster[data-density="compact"] .poster-header { height: 430px; }
        .poster[data-density="compact"] .title-block { margin-top: 56px; }
        .poster[data-density="compact"] .title-block h1 { font-size: 64px; }
        .poster[data-density="compact"] .subtitle-line p { font-size: 28px; }
        .poster[data-density="compact"] .poster-points { height: 1400px; gap: 18px; }
        .poster[data-density="compact"] .poster-point { grid-template-columns: 200px minmax(0, 1fr); }
        .poster[data-density="compact"] .point-number { font-size: 110px; }
        .poster[data-density="compact"] .point-label { min-width: 174px; font-size: 27px; padding: 14px 18px; }
        .poster[data-density="compact"] .point-content { padding: 28px 36px; }
        .poster[data-density="compact"] .point-content h2 { font-size: 28px; margin-bottom: 12px; }
        .poster[data-density="compact"] .point-content p { font-size: 20px; line-height: 1.48; }
        .poster[data-density="dense"] .poster-header { height: 350px; }
        .poster[data-density="dense"] .title-block { margin-top: 30px; }
        .poster[data-density="dense"] .title-block h1 { font-size: 54px; }
        .poster[data-density="dense"] .subtitle-line { margin-top: 20px; }
        .poster[data-density="dense"] .subtitle-line p { font-size: 24px; }
        .poster[data-density="dense"] .poster-points { height: 1490px; gap: 12px; }
        .poster[data-density="dense"] .poster-point { grid-template-columns: 164px minmax(0, 1fr); }
        .poster[data-density="dense"] .point-number { font-size: 84px; }
        .poster[data-density="dense"] .point-label { min-width: 142px; font-size: 22px; padding: 12px 14px; }
        .poster[data-density="dense"] .point-content { padding: 20px 28px; }
        .poster[data-density="dense"] .point-content h2 { font-size: 23px; margin-bottom: 8px; }
        .poster[data-density="dense"] .point-content p { font-size: 18px; line-height: 1.38; }

            grid-row: auto;
            left: 136px;
            top: 22px;
            min-width: 0;
            margin: 0;
            padding: 6px 14px;
            font-size: 18px;
            color: var(--poster-secondary);
            background: rgba(91, 140, 148, 0.1);
            border: 0;
            border-radius: 999px;
        }
        .template-clean .point-content {
            grid-column: 2;
            grid-row: 1 / span 2;
            padding: 58px 0 24px;
            border: 0;
            box-shadow: none;
            background: transparent;

        .template-vitality .poster-point:nth-child(even) {

        .template-clean .poster-bg-pattern {

        }
        .template-clean .poster-header {
            height: 430px;
            padding: 56px 86px 0;
            border-bottom: 0;
        }
        .template-clean .poster-logo {
            width: 150px;
        }
        .template-clean .title-block {
            margin-top: 62px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 42px;
            align-items: end;
        }
        .template-clean .title-block h1 {
            font-size: 70px;
            line-height: 1.12;
            color: var(--poster-primary);
        }
        .template-clean .subtitle-line {
            margin: 0;
            padding: 22px 24px;
            background: #fff;
            border-left: 8px solid var(--poster-accent);

        .template-clean .subtitle-line p {
            font-size: 26px;
            line-height: 1.45;
            color: #36505b;
        }
        .template-clean .poster-points {

            margin: 72px 78px 0;
            padding: 28px 34px;
            gap: 0;
            background: #fff;
            border: 1px solid rgba(35, 49, 63, 0.1);
            box-shadow: 0 18px 38px rgba(35, 49, 63, 0.08);
        }
        .template-clean .poster-point {

        .template-clean .poster-point:last-child {

        .template-clean .point-number {
            grid-column: 1;
            grid-row: 1;
            align-self: center;
            justify-self: center;
            width: 62px;
            height: 62px;
            padding: 0;
            border-radius: 16px;
            background: var(--poster-secondary);
            color: #fff;
            font-size: 26px;
        }
        .template-clean .point-label {
            position: static;
            grid-column: 2;
            grid-row: 1;
            align-self: center;
            justify-self: stretch;
            min-width: 0;
            margin: 0;
            padding: 16px 12px;
            border-radius: 0;
            border: 1px solid rgba(91, 140, 148, 0.2);
            background: rgba(91, 140, 148, 0.08);
            color: var(--poster-primary);
            font-size: 22px;
            line-height: 1.15;
        }
        .template-clean .point-content {
            grid-column: 3;
            grid-row: 1;
            padding: 26px 0;
            background: transparent;
            border: 0;
            box-shadow: none;
        }
