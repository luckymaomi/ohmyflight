<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计之王</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <style>
        body { background: transparent; padding: 20px; }
        .container-fluid { max-width: 1500px; }
        .status-bar { padding: 8px 12px; border-radius: 6px; background: #f6f8fa; color: #57606a; font-size: 13px; }
        .status-bar.success { background: #dafbe1; color: #1a7f37; }
        .status-bar.error { background: #ffebe9; color: #cf222e; }
        .upload-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; align-items: end; }
        .upload-status { grid-column: 1 / -1; }
        .top-work-grid, .result-grid, .bottom-work-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; align-items: stretch; }
        .top-work-grid > .card, .result-grid > .card, .bottom-work-grid > .card { min-width: 0; }
        .panel-scroll { min-height: 320px; max-height: 56vh; overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 12px; }
        .keyword-list-scroll { height: clamp(260px, 34vh, 360px); overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 8px; }
        .match-list-scroll { height: clamp(360px, 52vh, 560px); min-height: 0; max-height: none; }
        .checklist-text p { margin: 0 0 10px; line-height: 1.7; font-size: 14px; }
        .checklist-text p.active-source { outline: 2px solid rgba(13, 110, 253, 0.22); background: #f8fbff; border-radius: 4px; padding: 4px; }
        .empty-panel { color: #6c757d; font-size: 13px; padding: 18px; text-align: center; border: 1px dashed #dee2e6; border-radius: 6px; background: #f8f9fa; }
        .manual-chip { display: flex; justify-content: space-between; gap: 8px; padding: 8px 10px; border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; background: #f8f9fa; font-size: 13px; }
        .manual-chip.muted { opacity: 0.62; }
        .manual-name { overflow-wrap: anywhere; }
        .manual-actions { display: inline-flex; align-items: center; gap: 8px; flex: 0 0 auto; }
        .manual-toggle, .manual-delete { border: 0; background: transparent; padding: 0; font-size: 12px; }
        .manual-toggle { color: #495057; }
        .manual-delete { color: #dc3545; }
        .keyword-item { display: flex; align-items: stretch; border: 1px solid #dee2e6; border-radius: 6px; overflow: hidden; margin-bottom: 8px; background: #fff; }
        .keyword-item.active { border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.12); }
        .keyword-item.muted { opacity: 0.58; }
        .keyword-order-input { width: 48px; border: 0; border-right: 1px solid #dee2e6; border-radius: 0; text-align: center; font-size: 12px; }
        .keyword-order-input:focus { box-shadow: inset 0 0 0 1px rgba(13, 110, 253, 0.35); }
        .keyword-select { display: grid; grid-template-columns: 14px minmax(0, 1fr) auto; align-items: center; gap: 8px; width: 100%; border: 0; background: transparent; padding: 8px 10px; text-align: left; }
        .keyword-color { width: 12px; height: 12px; border-radius: 999px; }
        .keyword-main { min-width: 0; display: grid; gap: 3px; }
        .keyword-text { overflow-wrap: anywhere; font-size: 13px; }
        .keyword-count { color: #6c757d; font-variant-numeric: tabular-nums; }
        .keyword-source-status { width: fit-content; border-radius: 999px; padding: 1px 7px; font-size: 11px; line-height: 1.5; border: 1px solid #dee2e6; color: #6c757d; background: #f8f9fa; }
        .keyword-source-status.located { border-color: #badbcc; color: #0f5132; background: #d1e7dd; }
        .keyword-source-status.review { border-color: #ffecb5; color: #664d03; background: #fff3cd; }
        .keyword-evidence-status { width: fit-content; border-radius: 999px; padding: 1px 7px; font-size: 11px; line-height: 1.5; border: 1px solid #cfe2ff; color: #084298; background: #e7f1ff; }
        .keyword-label-input { width: 132px; border: 0; border-left: 1px solid #dee2e6; border-radius: 0; font-size: 12px; }
        .keyword-label-input:focus { box-shadow: inset 0 0 0 1px rgba(13, 110, 253, 0.35); }
        .keyword-toggle { width: 44px; border: 0; border-left: 1px solid #dee2e6; background: #fff; color: #495057; font-size: 12px; }
        .keyword-delete { width: 34px; border: 0; border-left: 1px solid #dee2e6; background: #fff; color: #dc3545; }
        .match-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .match-item { border: 1px solid #dee2e6; border-radius: 6px; padding: 10px; margin-bottom: 10px; background: #fff; cursor: pointer; }
        .match-item.active { border-color: #0d6efd; background: #f8fbff; }
        .match-item.bound-evidence { border: 2px solid #198754; background: #f3fff8; box-shadow: 0 0 0 2px rgba(25, 135, 84, 0.10); }
        .match-item.active.bound-evidence { border: 2px solid #198754; background: #edfff5; box-shadow: 0 0 0 2px rgba(25, 135, 84, 0.18); }
        .match-item:focus-visible { outline: 2px solid rgba(13, 110, 253, 0.35); outline-offset: 2px; }
        .match-meta { display: grid; grid-template-columns: auto minmax(80px, 1fr) auto auto auto; gap: 8px; align-items: center; color: #57606a; font-size: 12px; margin-bottom: 6px; min-width: 0; }
        .match-meta strong { color: #24292f; font-size: 13px; }
        .match-keyword, .match-mode, .match-bound-status, .match-evidence-action { white-space: nowrap; }
        .match-location { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .match-mode { border: 1px solid #dee2e6; border-radius: 4px; padding: 1px 6px; background: #f8f9fa; }
        .match-bound-status { border: 1px solid #badbcc; border-radius: 4px; padding: 1px 6px; color: #0f5132; background: #d1e7dd; font-weight: 600; }
        .match-evidence-action { grid-column: 5; justify-self: end; padding: 3px 8px; font-size: 12px; line-height: 1.25; }
        .match-context { line-height: 1.7; font-size: 14px; margin-bottom: 8px; overflow-wrap: anywhere; }
        .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; color: #57606a; font-size: 12px; margin-bottom: 10px; }
        .detail-meta strong { color: #24292f; font-size: 13px; }
        .detail-controls { display: inline-flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
        .detail-context-label { color: #6c757d; font-size: 12px; white-space: nowrap; }
        .detail-toolbar { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; margin-bottom: 10px; }
        .detail-text { line-height: 1.8; font-size: 14px; overflow-wrap: anywhere; white-space: pre-wrap; }
        .ak-highlight { padding: 0 2px; border-radius: 2px; color: inherit; }
        .ak-manual-evidence-highlight { background: #d1e7dd; border-radius: 3px; }
        .audit-clause { border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 12px; background: #fff; overflow: hidden; }
        .audit-clause-head { padding: 10px 12px; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }
        .evidence-order-input { width: 56px; text-align: center; font-size: 12px; }
        .audit-evidence-row { padding: 10px 12px; border-bottom: 1px solid #eef0f2; }
        .audit-evidence-row:last-child { border-bottom: 0; }
        .audit-evidence-content { line-height: 1.6; min-height: 70px; }
        .audit-clause-empty { padding: 14px 12px; color: #6c757d; font-size: 13px; background: #fff; }
        .evidence-list-scroll { height: clamp(360px, 52vh, 620px); overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 12px; }
        .evidence-list-scroll .audit-clause:last-child { margin-bottom: 0; }
        .manual-evidence-scroll { height: clamp(360px, 52vh, 620px); overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 8px; }
        .manual-evidence-item { border: 1px solid #dee2e6; border-radius: 6px; padding: 10px; margin-bottom: 8px; background: #fff; }
        .manual-evidence-item:last-child { margin-bottom: 0; }
        .manual-evidence-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; font-size: 13px; }
        .manual-evidence-text { line-height: 1.6; font-size: 13px; overflow-wrap: anywhere; margin-bottom: 6px; }
        .manual-evidence-note { color: #6c757d; font-size: 12px; margin-bottom: 6px; }
        .folder-preview { min-height: 54px; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 8px; }
        .folder-preview-grid { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .folder-preview-grid span { border: 1px solid #dee2e6; border-radius: 4px; background: #f8f9fa; padding: 2px 7px; font-size: 12px; line-height: 1.6; }
        .pdf-locator-docs { min-height: 34px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .pdf-locator-doc-chip { border: 1px solid #dee2e6; border-radius: 4px; padding: 3px 7px; background: #f8f9fa; font-size: 12px; }
        .pdf-locator-work-grid { --pdf-workspace-height: clamp(860px, 86vh, 1180px); display: grid; grid-template-columns: minmax(360px, 0.95fr) minmax(420px, 1.05fr); gap: 16px; align-items: stretch; }
        .pdf-locator-results { height: var(--pdf-workspace-height); overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 10px; }
        .pdf-locator-side { height: var(--pdf-workspace-height); min-height: 0; display: flex; flex-direction: column; }
        .pdf-locator-status { min-width: 0; border: 1px solid #dee2e6; border-radius: 999px; padding: 2px 8px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; background: #f8f9fa; color: #495057; }
        .pdf-locator-status.trusted { color: #0f5132; background: #d1e7dd; border-color: #badbcc; }
        .pdf-locator-status.review { color: #664d03; background: #fff3cd; border-color: #ffecb5; }
        .pdf-locator-status.miss { color: #842029; background: #f8d7da; border-color: #f5c2c7; }
        .pdf-locator-status.skip { color: #41464b; background: #e2e3e5; border-color: #d3d6d8; }
        .pdf-locator-evidence { min-width: 260px; max-width: 380px; overflow-wrap: anywhere; }
        .pdf-slot-card { border: 1px solid #dee2e6; border-radius: 6px; padding: 10px; margin-bottom: 10px; background: #fff; }
        .pdf-slot-card.active { border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.12); }
        .pdf-slot-head { display: grid; grid-template-columns: auto 76px minmax(150px, 1fr) auto; gap: 8px; align-items: center; margin-bottom: 8px; }
        .pdf-slot-check { margin: 0; display: flex; align-items: center; }
        .pdf-slot-sequence { text-align: center; font-weight: 600; }
        .pdf-slot-meta { display: flex; flex-wrap: wrap; gap: 8px; color: #6c757d; font-size: 12px; margin-bottom: 6px; }
        .pdf-slot-evidence { height: 132px; overflow: auto; color: #495057; font-size: 13px; line-height: 1.65; overflow-wrap: anywhere; border: 1px solid #eef0f2; border-radius: 6px; background: #fff; padding: 8px 10px; }
        .pdf-detail-panel { flex: 0 0 auto; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 12px; margin-bottom: 12px; }
        .pdf-detail-title { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px; }
        .pdf-compare-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; }
        .pdf-compare-title { font-size: 12px; color: #6c757d; margin-bottom: 6px; }
        .pdf-original-text { max-height: 180px; overflow: auto; border: 1px solid #eef0f2; border-radius: 6px; padding: 10px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; overflow-wrap: anywhere; background: #f8f9fa; }
        .pdf-segment-list { max-height: 180px; overflow: auto; display: grid; gap: 6px; }
        .pdf-segment { display: grid; grid-template-columns: 42px minmax(0, 1fr); gap: 8px; align-items: start; border: 1px solid #dee2e6; border-radius: 6px; padding: 6px 8px; font-size: 12px; line-height: 1.6; }
        .pdf-segment span { font-weight: 600; }
        .pdf-segment em { font-style: normal; overflow-wrap: anywhere; }
        .pdf-segment.matched { border-color: #badbcc; background: #f3fff8; color: #0f5132; }
        .pdf-segment.missing { border-color: #f5c2c7; background: #fff7f8; color: #842029; }
        .pdf-preview-panel { flex: 1 1 auto; min-height: 0; overflow: auto; border: 1px solid #dee2e6; border-radius: 6px; background: #f8f9fa; padding: 12px; }
        .pdf-preview-page { margin: 0 auto 14px; width: fit-content; max-width: 100%; border: 1px solid #dee2e6; border-radius: 6px; background: #fff; padding: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .pdf-preview-page canvas { display: block; max-width: 100%; height: auto; }
        .pdf-preview-label { color: #6c757d; font-size: 12px; margin-bottom: 6px; }
        @media (max-width: 900px) {
            .upload-grid, .top-work-grid, .result-grid, .bottom-work-grid, .pdf-locator-work-grid, .pdf-compare-grid { grid-template-columns: 1fr; }
            .upload-status { grid-column: auto; }
            .detail-toolbar { grid-template-columns: 1fr; }
            .panel-scroll { max-height: 480px; }
            .pdf-locator-results, .pdf-locator-side { height: auto; }
            .pdf-preview-panel { min-height: 620px; }
        }
    </style>
    <link rel="stylesheet" href="../../../theme.css">
</head>
<body>
<div class="container-fluid">
    <div class="card mb-3">
        <div class="card-body text-center position-relative py-2">
            <a href="../../../index.html" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-decoration-none">返回</a>
            <h5 class="card-title mb-0">审计之王</h5>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="upload-grid">
                <div>
                    <label class="form-label">检查单</label>
                    <input class="form-control" type="file" id="checklistInput" accept=".docx">
                </div>
                <div>
                    <label class="form-label">公司手册</label>
                    <input class="form-control" type="file" id="manualInput" accept=".docx" multiple>
                </div>
                <div class="upload-status">
                    <div id="statusBar" class="status-bar">上传检查单和手册后，手动添加关键词开始检索。</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-lg-4">
                    <label class="form-label">文件夹范围</label>
                    <input class="form-control" id="folderRangeInput" value="1.1-1.61" placeholder="例如 1.1-1.61">
                </div>
                <div class="col-12 col-lg-auto">
                    <button class="btn btn-outline-primary w-100" id="exportFolderScriptBtn">导出Python</button>
                </div>
                <div class="col-12 col-lg">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0">文件夹预览</label>
                        <small class="text-muted" id="folderScriptCount">0 个文件夹</small>
                    </div>
                    <div class="folder-preview" id="folderScriptPreview"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="top-work-grid mb-3">
        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <h6 class="card-title mb-0">关键词池</h6>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="importKeywordsBtn">导入</button>
                        <button class="btn btn-sm btn-outline-secondary" id="exportKeywordsBtn">导出</button>
                    </div>
                </div>
                <input class="d-none" type="file" id="keywordImportInput" accept=".xlsx,.xls">
                <div class="input-group input-group-sm mb-2">
                    <input type="text" class="form-control" id="keywordInput" placeholder="手动输入关键词">
                    <button class="btn btn-outline-primary" id="addKeywordBtn">加入</button>
                </div>
                <button class="btn btn-sm btn-outline-secondary mb-2" id="showAllKeywordsBtn">查看全部命中</button>
                <div id="keywordList" class="keyword-list-scroll mb-3"></div>
                <h6 class="card-title mb-2">手册</h6>
                <div id="manualList"></div>
            </div>
        </section>

        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <div>
                        <h6 class="card-title mb-0">命中结果</h6>
                        <small class="text-muted" id="matchCount">0 条命中</small>
                    </div>
                    <div class="match-toolbar">
                        <select class="form-select form-select-sm" id="manualFilter" style="width: 180px">
                            <option value="all">全部手册</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary" id="prevMatchBtn">上一个</button>
                        <button class="btn btn-sm btn-outline-secondary" id="nextMatchBtn">下一个</button>
                    </div>
                </div>
                <div id="matchList" class="panel-scroll match-list-scroll"></div>
            </div>
        </section>
    </div>

    <div class="result-grid">
        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <h6 class="card-title mb-0">检查单参考</h6>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="bindSelectedSourceBtn">绑定到当前关键词</button>
                        <button class="btn btn-sm btn-outline-danger" id="unbindSelectedSourceBtn">解绑当前关键词</button>
                        <button class="btn btn-sm btn-outline-primary" id="addSelectedKeywordBtn">选中加入关键词</button>
                    </div>
                </div>
                <div id="checklistText" class="panel-scroll checklist-text"></div>
            </div>
        </section>

        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <h6 class="card-title mb-0">全部详情</h6>
                    <div class="detail-controls">
                        <span class="detail-context-label" id="matchDetailContextLabel">未加载</span>
                        <button class="btn btn-sm btn-outline-primary" id="addSelectedManualEvidenceBtn" data-action="add-selected-manual-evidence" disabled>选中内容加入手册证据</button>
                        <button class="btn btn-sm btn-outline-secondary" id="expandMatchDetailBtn" data-action="expand-match-detail" disabled>查看更多上下文</button>
                    </div>
                </div>
                <div id="matchDetail" class="panel-scroll"></div>
            </div>
        </section>
    </div>

    <div class="bottom-work-grid mt-3">
        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <h6 class="card-title mb-0">当前关键词手册证据</h6>
                    <small class="text-muted" id="keywordEvidenceCount">未选择关键词</small>
                </div>
                <div id="keywordEvidenceList" class="manual-evidence-scroll"></div>
            </div>
        </section>

        <section class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <div>
                        <h6 class="card-title mb-0">审计篮子</h6>
                        <small class="text-muted" id="evidenceCount">0 条依据</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="importEvidenceBtn">导入</button>
                        <button class="btn btn-sm btn-primary" id="exportEvidenceBtn">导出Excel</button>
                    </div>
                </div>
                <input class="d-none" type="file" id="evidenceImportInput" accept=".xlsx,.xls">
                <div class="row g-2 align-items-center mb-3">
                    <div class="col">
                        <input class="form-control form-control-sm" id="evidenceGroupTitleInput" placeholder="新增条款名称">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-sm btn-outline-primary" id="addEvidenceGroupBtn">新增条款</button>
                    </div>
                </div>
                <div id="evidenceList" class="evidence-list-scroll"></div>
            </div>
        </section>
    </div>

    <section class="card mt-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-3 flex-wrap">
                <div>
                    <h6 class="card-title mb-1">PDF证据工作区</h6>
                    <div class="text-muted small" id="pdfLocatorSummary">0 个 PDF / 0 条依据 / 可信 0 / 需确认 0 / 未命中 0 / 跳过 0</div>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <input class="d-none" type="file" id="pdfLocatorPdfInput" accept=".pdf" multiple>
                    <input class="d-none" type="file" id="pdfLocatorWorkspaceInput" accept=".json,application/json">
                    <button class="btn btn-sm btn-outline-secondary" id="pdfLocatorUploadBtn">上传PDF</button>
                    <button class="btn btn-sm btn-outline-primary" id="pdfLocatorBuildFromBasketBtn">从审计篮子生成</button>
                    <button class="btn btn-sm btn-primary" id="pdfLocatorRunBtn">自动识别</button>
                    <button class="btn btn-sm btn-outline-secondary" id="pdfLocatorImportWorkspaceBtn">导入工作区</button>
                    <button class="btn btn-sm btn-outline-secondary" id="pdfLocatorExportWorkspaceBtn">导出工作区</button>
                    <button class="btn btn-sm btn-outline-primary" id="pdfLocatorExportSelectedBtn">导出勾选</button>
                    <button class="btn btn-sm btn-outline-primary" id="pdfLocatorExportAllBtn">导出全部</button>
                    <button class="btn btn-sm btn-outline-danger" id="pdfLocatorClearBtn">清空</button>
                </div>
            </div>
            <div class="row g-2 align-items-end mb-3">
                <div class="col-12 col-lg-3">
                    <label class="form-label">空槽编号范围</label>
                    <input class="form-control form-control-sm" id="pdfLocatorRangeInput" value="1.1-1.61" placeholder="例如 1.1-1.61">
                </div>
                <div class="col-12 col-lg-auto">
                    <button class="btn btn-sm btn-outline-secondary w-100" id="pdfLocatorBuildEmptyBtn">生成空槽</button>
                </div>
                <div class="col-12 col-lg-auto">
                    <div class="form-check mb-1">
                        <input class="form-check-input" type="checkbox" id="pdfLocatorExpandContextInput" checked>
                        <label class="form-check-label" for="pdfLocatorExpandContextInput">前后各加1页</label>
                    </div>
                </div>
                <div class="col-12 col-lg">
                    <label class="form-label">已上传 PDF</label>
                    <div class="pdf-locator-docs" id="pdfLocatorDocumentList"></div>
                </div>
            </div>
            <div class="pdf-locator-work-grid">
                <div id="pdfLocatorResultList" class="pdf-locator-results">
                    <div class="empty-panel">从审计篮子生成槽位，或按编号范围生成空槽。</div>
                </div>
                <div class="pdf-locator-side">
                    <div id="pdfLocatorSlotDetail" class="pdf-detail-panel">
                        <div class="empty-panel">选择一个槽位后查看原文和切片对比。</div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                        <h6 class="card-title mb-0">页面预览</h6>
                        <small class="text-muted">点击左侧槽位自动刷新</small>
                    </div>
                    <div id="pdfLocatorPreview" class="pdf-preview-panel">
                        <div class="empty-panel">选择 PDF 和页码后预览。</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
