<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培训工具合集</title>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <link rel="stylesheet" href="./styles/suite.css">
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="hero-bar">
                <h1 class="hero-title">培训工具合集</h1>
                <a class="hero-link" href="../../../index.html" target="_blank" rel="noopener noreferrer">返回首页</a>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <div>
                    <h2 class="section-title">工具列表</h2>
                    <p class="section-intro">这里集中放培训预排班、培训有效期更新、培训冲突核对和飞行部培训规则速查。</p>
                </div>
            </div>
            <div class="tool-grid">
                <article class="tool-card">
                    <h3>培训预排班</h3>
                    <p>导入规则表和有效期表，按指定培训日期生成已过期、窗口期内等分类结果。</p>
                    <a class="tool-card-link" href="./schedule.html" target="_blank" rel="noopener noreferrer">打开工具</a>
                </article>
                <article class="tool-card">
                    <h3>培训有效期更新</h3>
                    <p>导入培训表和有效期表，生成更新预览，并导出更新后的有效期表。</p>
                    <a class="tool-card-link" href="./validity-update.html" target="_blank" rel="noopener noreferrer">打开工具</a>
                </article>
                <article class="tool-card">
                    <h3>培训冲突核对</h3>
                    <p>只看姓名、项目名称、培训开始日期和培训结束日期，核对同名人员培训日期是否重叠，并支持导出标红结果。</p>
                    <a class="tool-card-link" href="./conflict-check.html" target="_blank" rel="noopener noreferrer">打开工具</a>
                </article>
                <article class="tool-card">
                    <h3>飞行部培训规则速查</h3>
                    <p>查看规则口径、项目对照、案例说明、数据规范和模板下载。</p>
                    <a class="tool-card-link" href="./rule-reference.html" target="_blank" rel="noopener noreferrer">打开工具</a>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
