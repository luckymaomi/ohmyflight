<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换季学习抽风查询助手（测试）</title>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <style>
        body { background: transparent; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card mb-4">
            <div class="card-body text-center position-relative">
                <a href="../../../index.html" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-decoration-none">返回首页</a>
                <h4 class="card-title mb-1">换季学习抽风查询助手（测试）</h4>
                <p class="text-muted mb-0 small">登录培训系统后，批量查询换季学习记录和课时，并导出 Excel 核对结果。</p>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title border-bottom pb-2 mb-3">工具介绍</h5>
                <p>这是一个 Python + Playwright 工具，用于在培训系统中批量查询员工换季学习记录，并核对培训课时是否符合要求。</p>
                <p class="mb-0">脚本会在浏览器登录后逐条查询员工号，自动生成 Excel 结果文件，适合做换季学习抽查或批量核对。</p>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title border-bottom pb-2 mb-3">下载</h5>
                <a href="app.py" download class="btn btn-outline-secondary">下载 app.py</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title border-bottom pb-2 mb-3">使用说明</h5>
                <p>安装依赖：</p>
                <pre class="bg-light p-2 rounded"><code>pip install playwright openpyxl
playwright install chromium</code></pre>
                <p class="mt-3">运行脚本：</p>
                <pre class="bg-light p-2 rounded mb-0"><code>python app.py</code></pre>
            </div>
        </div>
    </div>
</body>
<script src="shell.js"></script>
</html>
