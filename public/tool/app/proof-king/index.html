<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>校对之王</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <link rel="stylesheet" href="../../../theme.css">
    <style>
        body { background: #f4f5f7; color: #212529; }
        .page-shell { max-width: 1760px; margin: 0 auto; padding: 16px; }
        .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
        .topbar h1 { margin: 0; font-size: 22px; }
        .topbar p { margin: 3px 0 0; color: #6c757d; font-size: 13px; }
        .section { margin-bottom: 12px; border: 1px solid #dfe3e7; background: #fff; }
        .section-body { padding: 12px; }
        .upload-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .upload-side { min-width: 0; padding: 10px; border: 1px solid #e2e5e8; background: #fafbfc; }
        .upload-title { margin-bottom: 7px; font-weight: 650; }
        .range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 7px; }
        .manual-status { min-height: 20px; margin-top: 7px; color: #6c757d; font-size: 12px; overflow-wrap: anywhere; }
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
        .summary-item { min-height: 62px; padding: 9px 11px; border: 1px solid #dfe3e7; background: #fff; }
        .summary-item span { display: block; color: #6c757d; font-size: 12px; }
        .summary-item strong { display: block; margin-top: 3px; font-size: 21px; }
        .summary-added strong { color: #146c43; }
        .summary-removed strong { color: #a52834; }
        .summary-modified strong { color: #806000; }
        .summary-review strong { color: #59636d; }
        .summary-same strong { color: #0a58ca; }
        .workbench { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 12px; height: clamp(1180px, calc(90vh + 340px), 1380px); align-items: stretch; }
        .queue { min-width: 0; min-height: 0; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .queue-toolbar { padding: 0 0 10px; }
        .queue-search { margin-bottom: 9px; }
        .filter-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 8px; }
        .filter-button { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; padding: 6px 8px; border: 1px solid #ced4da; background: #fff; color: #495057; font-size: 12px; }
        .filter-button:first-child { grid-column: 1 / -1; }
        .filter-button span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .filter-button strong { flex: 0 0 auto; min-width: 24px; text-align: right; font-size: 12px; }
        .filter-button.active { border-color: #0d6efd; color: #0d6efd; background: #eef5ff; font-weight: 650; }
        .outline-level { margin-bottom: 9px; }
        .outline-level-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; color: #59636d; font-size: 11px; font-weight: 650; }
        .outline-navigation { max-height: 142px; overflow-y: auto; border: 1px solid #dfe3e7; background: #fff; }
        .section-navigation { max-height: 178px; }
        .outline-button { position: relative; display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 8px; width: 100%; min-height: 34px; padding: 5px 8px 5px 24px; border: 0; border-bottom: 1px solid #edf0f2; background: #fff; color: #343a40; text-align: left; font-size: 12px; }
        .outline-button:last-child { border-bottom: 0; }
        .outline-button::before { position: absolute; left: 9px; width: 7px; height: 7px; border-right: 1.5px solid #6c757d; border-bottom: 1.5px solid #6c757d; content: ""; transform: rotate(-45deg); }
        .outline-button.active { background: #eef5ff; color: #0a58ca; font-weight: 650; }
        .outline-button.active::before { top: 11px; transform: rotate(45deg); }
        .outline-button span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .outline-button strong { color: #6c757d; font-size: 11px; }
        .section-button { min-height: 38px; }
        .outline-empty { padding: 12px 9px; color: #8a939b; font-size: 11px; text-align: center; }
        .queue-meta { display: flex; justify-content: space-between; gap: 8px; margin-top: 6px; color: #6c757d; font-size: 12px; }
        .event-navigation { position: relative; min-height: 0; flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; padding-right: 5px; }
        .event-visible { position: absolute; inset: 0 0 auto; }
        .event-row { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto auto auto; gap: 2px 7px; width: 100%; height: 112px; padding: 8px; border: 1px solid #e0e4e8; background: #fff; text-align: left; overflow: hidden; }
        .event-row.active { border-color: #0d6efd; background: #f4f8ff; box-shadow: inset 0 0 0 1px #0d6efd; }
        .event-reference-added .event-kind { color: #146c43; background: #eaf6ef; }
        .event-reference-removed .event-kind { color: #a52834; background: #fbeaec; }
        .event-modified .event-kind { color: #806000; background: #fff7d6; }
        .event-review .event-kind { color: #59636d; background: #edf0f2; }
        .event-kind { align-self: start; padding: 1px 5px; background: #edf0f2; color: #495057; font-size: 11px; }
        .event-row strong { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        .event-location { grid-column: 1 / -1; color: #6c757d; font-size: 11px; }
        .event-excerpt { grid-column: 1 / -1; display: -webkit-box; overflow: hidden; -webkit-box-orient: vertical; -webkit-line-clamp: 3; color: #495057; font-size: 12px; line-height: 1.45; }
        .event-excerpt mark { padding: 0 1px; background: #ffe69c; color: #212529; }
        .navigation-empty { padding: 24px 12px; color: #6c757d; text-align: center; font-size: 13px; }
        .review { min-width: 0; min-height: 0; height: 100%; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #dfe3e7; border-radius: 6px; background: #fff; }
        .selection-head { min-height: 66px; padding: 10px 12px; border-bottom: 1px solid #dfe3e7; }
        .selection-head h2 { margin: 0 0 3px; font-size: 16px; }
        .selection-head p { margin: 0; color: #6c757d; font-size: 12px; }
        .token-changes { margin-top: 4px; color: #842029; font-size: 12px; }
        .change-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border-bottom: 1px solid #dfe3e7; }
        .change-side { min-width: 0; min-height: 210px; padding: 10px 12px; }
        .change-side + .change-side { border-left: 1px solid #dfe3e7; }
        .change-side-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 7px; font-size: 12px; font-weight: 650; }
        .change-location { color: #6c757d; font-weight: 400; }
        .change-text { height: 210px; overflow-y: auto; overflow-x: hidden; white-space: pre-wrap; overflow-wrap: anywhere; font-size: 13px; line-height: 1.7; }
        .context-neighbor { color: #5f6871; }
        .context-focus { color: #212529; background: #fff8db; }
        .context-block { display: block; margin-bottom: 7px; padding: 6px 8px; border: 1px solid transparent; }
        .context-block:last-child { margin-bottom: 0; }
        .context-block-label { display: block; margin-bottom: 2px; color: #6c757d; font-size: 11px; font-weight: 650; }
        .context-anchor { border-color: #cfe2ff; background: #eef5ff; color: #20364f; }
        .context-missing { border-color: #dee2e6; background: #f8f9fa; color: #6c757d; }
        .context-insertion { border: 1px dashed #b58105; background: #fff8db; color: #664d03; font-weight: 650; text-align: center; }
        .diff-removed { color: #842029; background: #f8d7da; text-decoration: line-through; }
        .diff-added { color: #0f5132; background: #d1e7dd; }
        .diff-equal { color: #343a40; }
        .missing-text { color: #adb5bd; font-style: italic; }
        .source-grid { min-height: 0; flex: 1 1 auto; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .source-pane { min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        .source-pane + .source-pane { border-left: 1px solid #dfe3e7; }
        .source-title { min-height: 40px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; border-bottom: 1px solid #dfe3e7; background: #f8f9fa; font-size: 12px; }
        .source-title span:last-child { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6c757d; }
        .source-view { min-width: 0; min-height: 0; flex: 1 1 auto; overflow-y: scroll; overflow-x: hidden; padding: 12px; background: #e9ecef; scrollbar-gutter: stable; }
        .word-reader-paper { width: min(100%, 760px); min-height: 100%; margin: 0 auto; padding: 34px 42px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.16); }
        .word-unit { margin: 0 0 10px; content-visibility: auto; contain-intrinsic-size: auto 48px; color: #212529; font-size: 13px; line-height: 1.75; text-align: justify; overflow-wrap: anywhere; }
        .word-heading { margin-top: 18px; font-size: 15px; font-weight: 700; text-align: left; }
        .word-table-row { padding: 5px 7px; border: 1px solid #dfe3e7; margin-bottom: -1px; background: #fff; }
        .word-unit-focus { outline: 3px solid #dc3545; outline-offset: 4px; background: #fff3cd; box-shadow: 0 0 0 7px rgba(220, 53, 69, .12); }
        .pdf-page-shell { width: 100%; max-width: 100%; margin: 0 auto 14px; padding: 8px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.16); }
        .pdf-page-content { display: flex; align-items: center; justify-content: center; width: 100%; background: #f8f9fa; }
        .pdf-page-shell canvas { display: block; max-width: 100%; height: auto; }
        .pdf-page-label { margin-bottom: 6px; color: #6c757d; font-size: 12px; }
        .pdf-page-loading { align-self: center; padding: 24px 12px; color: #6c757d; font-size: 12px; text-align: center; }
        .preview-empty { padding: 28px 12px; color: #6c757d; text-align: center; }
        @media (max-width: 1200px) {
            .workbench { grid-template-columns: 300px minmax(0, 1fr); }
            .word-reader-paper { padding: 26px 28px; }
        }
        @media (max-width: 900px) {
            .upload-grid, .change-grid, .source-grid { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .workbench { grid-template-columns: 1fr; height: auto; }
            .queue { height: 520px; }
            .review { height: auto; }
            .source-grid { height: auto; }
            .source-view { height: 560px; flex: 0 0 auto; }
            .change-side + .change-side, .source-pane + .source-pane { border-left: 0; border-top: 1px solid #dfe3e7; }
        }
    </style>
</head>
<body>
<main class="page-shell">
    <header class="topbar">
        <div><h1>校对之王</h1><p>按原文顺序发现参考新增、参考删除和内容修改。</p></div>
        <a class="btn btn-outline-secondary btn-sm" href="../../index.html">返回工具页</a>
    </header>

    <div id="workspaceMessage" class="alert alert-secondary py-2 mb-3">上传我的手册和参考手册后开始比对。</div>

    <section class="section">
        <div class="section-body">
            <div class="upload-grid">
                <div class="upload-side">
                    <div class="upload-title">我的手册（基准）</div>
                    <input id="myInput" class="form-control form-control-sm" type="file" accept=".docx,.pdf">
                    <div class="range-row"><input id="myStartPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 起始页"><input id="myEndPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 结束页"></div>
                    <div id="myStatus" class="manual-status">未上传</div>
                </div>
                <div class="upload-side">
                    <div class="upload-title">参考手册（对照）</div>
                    <input id="referenceInput" class="form-control form-control-sm" type="file" accept=".docx,.pdf">
                    <div class="range-row"><input id="referenceStartPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 起始页"><input id="referenceEndPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 结束页"></div>
                    <div id="referenceStatus" class="manual-status">未上传</div>
                </div>
            </div>
            <div class="actions"><button id="compareButton" class="btn btn-primary btn-sm" type="button">开始比对</button><button id="exportButton" class="btn btn-outline-primary btn-sm" type="button" disabled>导出 Excel</button><button id="exportWordButton" class="btn btn-outline-primary btn-sm" type="button" disabled>导出 Word</button></div>
        </div>
    </section>

    <div id="summaryGrid" class="summary-grid"></div>

    <section class="workbench">
        <section class="queue" aria-label="修订事件列表">
            <div class="queue-toolbar">
                <div id="filterBar" class="filter-bar"></div>
                <div class="queue-search">
                    <input id="eventSearch" class="form-control form-control-sm" type="search" placeholder="搜索编号、小节或原文">
                </div>
                <div class="outline-level">
                    <div class="outline-level-head"><span>章节</span><span id="chapterCount"></span></div>
                    <div id="chapterNavigation" class="outline-navigation"></div>
                </div>
                <div class="outline-level">
                    <div class="outline-level-head"><span>当前章节的小节</span><span id="sectionCount"></span></div>
                    <div id="sectionNavigation" class="outline-navigation section-navigation"></div>
                </div>
                <div class="queue-meta"><span>当前小节的修订事件</span><span id="resultCount"></span></div>
            </div>
            <div id="eventNavigation" class="event-navigation"><div id="eventSpacer"></div><div id="eventVisible" class="event-visible"></div></div>
        </section>

        <section class="review">
            <div class="selection-head">
                <h2 id="selectionTitle">选择一项修订事件</h2>
                <p id="selectionReason">新增和删除排在前面；一致内容默认不进入待办。</p>
                <div id="tokenChanges" class="token-changes"></div>
            </div>
            <div class="change-grid">
                <div class="change-side"><div class="change-side-head"><span>我的手册原文及上下文</span><span id="myChangeLocation" class="change-location"></span></div><div id="myChangeText" class="change-text"><span class="missing-text">等待选择</span></div></div>
                <div class="change-side"><div class="change-side-head"><span>参考手册原文及上下文</span><span id="referenceChangeLocation" class="change-location"></span></div><div id="referenceChangeText" class="change-text"><span class="missing-text">等待选择</span></div></div>
            </div>
            <div class="source-grid">
                <section class="source-pane"><div class="source-title"><strong>我的手册完整原稿</strong><span id="mySourceName">我的手册原文</span></div><div id="mySource" class="source-view"><div class="preview-empty">上传文件后显示原文。</div></div></section>
                <section class="source-pane"><div class="source-title"><strong>参考手册完整原稿</strong><span id="referenceSourceName">参考手册原文</span></div><div id="referenceSource" class="source-view"><div class="preview-empty">上传文件后显示原文。</div></div></section>
            </div>
        </section>
    </section>
</main>

<script src="../../../libs/bootstrap.bundle.min.js"></script>
<script src="../../../libs/mammoth.min.js"></script>
<script src="../../../libs/pdf.min.js"></script>
<script src="../../../libs/xlsx-js-style.min.js"></script>
<script src="../../../libs/docx.iife.js"></script>
<script src="special-rules.js"></script>
<script src="manual-reader.js"></script>
<script src="navigation.js"></script>
<script src="revision-navigation-view.js"></script>
<script src="document-context.js"></script>
<script src="word-document-view.js"></script>
<script src="pdf-document-view.js"></script>
<script src="report-model.js"></script>
<script src="excel-report.js"></script>
<script src="word-report.js"></script>
<script src="workspace.js"></script>
<script src="main.js"></script>
</body>
</html>
