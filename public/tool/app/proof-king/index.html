<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>校对之王</title>
    <script src="../../../theme.js"></script>
    <link rel="stylesheet" href="../../../libs/bootstrap.min.css">
    <link rel="stylesheet" href="../../../theme.css">
    <style>
        body { background: #f4f5f7; color: #212529; }
        .page-shell { max-width: 1760px; margin: 0 auto; padding: 16px; }
        .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
        .topbar h1 { margin: 0; font-size: 22px; }
        .topbar p { margin: 3px 0 0; color: #6c757d; font-size: 13px; }
        .section { margin-bottom: 12px; border: 1px solid #dfe3e7; background: #fff; }
        .section-body { padding: 12px; }
        .upload-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .upload-side { min-width: 0; padding: 10px; border: 1px solid #e2e5e8; background: #fafbfc; }
        .upload-title { margin-bottom: 7px; font-weight: 650; }
        .range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 7px; }
        .manual-status { min-height: 20px; margin-top: 7px; color: #6c757d; font-size: 12px; overflow-wrap: anywhere; }
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
        .summary-item { min-height: 62px; padding: 9px 11px; border: 1px solid #dfe3e7; border-left-width: 4px; background: #fff; }
        .summary-item span { display: block; color: #6c757d; font-size: 12px; }
        .summary-item strong { display: block; margin-top: 3px; font-size: 21px; }
        .summary-added { border-left-color: #198754; }
        .summary-removed { border-left-color: #b02a37; }
        .summary-modified { border-left-color: #b58105; }
        .summary-review { border-left-color: #6c757d; }
        .summary-same { border-left-color: #0d6efd; }
        .workbench { display: grid; grid-template-columns: 340px minmax(0, 1fr); height: 1120px; border: 1px solid #dfe3e7; background: #fff; }
        .queue { min-width: 0; display: flex; flex-direction: column; border-right: 1px solid #dfe3e7; background: #fafbfc; }
        .queue-toolbar { padding: 10px; border-bottom: 1px solid #dfe3e7; }
        .filter-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 8px; }
        .filter-button { padding: 5px 7px; border: 1px solid #ced4da; background: #fff; color: #495057; font-size: 12px; }
        .filter-button.active { border-color: #0d6efd; color: #0d6efd; background: #eef5ff; font-weight: 650; }
        .queue-meta { display: flex; justify-content: space-between; gap: 8px; margin-top: 6px; color: #6c757d; font-size: 12px; }
        .event-navigation { position: relative; min-height: 0; flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; }
        .event-visible { position: absolute; inset: 0 0 auto; padding: 6px; }
        .event-row { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto auto auto; gap: 2px 7px; width: 100%; height: 112px; padding: 8px; border: 1px solid #e0e4e8; border-left-width: 4px; background: #fff; text-align: left; overflow: hidden; }
        .event-row.active { border-color: #0d6efd; background: #f4f8ff; box-shadow: inset 0 0 0 1px #0d6efd; }
        .event-reference-added { border-left-color: #198754; }
        .event-reference-removed { border-left-color: #b02a37; }
        .event-modified { border-left-color: #b58105; }
        .event-review { border-left-color: #6c757d; }
        .event-kind { align-self: start; padding: 1px 5px; background: #edf0f2; color: #495057; font-size: 11px; }
        .event-row strong { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        .event-location { grid-column: 1 / -1; color: #6c757d; font-size: 11px; }
        .event-excerpt { grid-column: 1 / -1; display: -webkit-box; overflow: hidden; -webkit-box-orient: vertical; -webkit-line-clamp: 3; color: #495057; font-size: 12px; line-height: 1.45; }
        .navigation-empty { padding: 24px 12px; color: #6c757d; text-align: center; font-size: 13px; }
        .review { min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        .selection-head { min-height: 66px; padding: 10px 12px; border-bottom: 1px solid #dfe3e7; }
        .selection-head h2 { margin: 0 0 3px; font-size: 16px; }
        .selection-head p { margin: 0; color: #6c757d; font-size: 12px; }
        .token-changes { margin-top: 4px; color: #842029; font-size: 12px; }
        .change-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border-bottom: 1px solid #dfe3e7; }
        .change-side { min-width: 0; min-height: 170px; padding: 10px 12px; }
        .change-side + .change-side { border-left: 1px solid #dfe3e7; }
        .change-side-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 7px; font-size: 12px; font-weight: 650; }
        .change-location { color: #6c757d; font-weight: 400; }
        .change-text { max-height: 220px; overflow-y: auto; white-space: pre-wrap; overflow-wrap: anywhere; font-size: 13px; line-height: 1.7; }
        .diff-removed { color: #842029; background: #f8d7da; text-decoration: line-through; }
        .diff-added { color: #0f5132; background: #d1e7dd; }
        .diff-equal { color: #343a40; }
        .missing-text { color: #adb5bd; font-style: italic; }
        .source-grid { min-height: 0; flex: 1 1 auto; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .source-pane { min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        .source-pane + .source-pane { border-left: 1px solid #dfe3e7; }
        .source-title { min-height: 38px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; border-bottom: 1px solid #dfe3e7; background: #f8f9fa; font-size: 12px; }
        .source-title span:last-child { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6c757d; }
        .source-view { min-width: 0; min-height: 0; flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; padding: 12px; background: #e9ecef; }
        .word-reader-paper { width: min(100%, 760px); min-height: 100%; margin: 0 auto; padding: 34px 42px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.16); }
        .word-unit { margin: 0 0 10px; content-visibility: auto; contain-intrinsic-size: auto 48px; color: #212529; font-size: 13px; line-height: 1.75; text-align: justify; overflow-wrap: anywhere; }
        .word-heading { margin-top: 18px; font-size: 15px; font-weight: 700; text-align: left; }
        .word-table-row { padding: 5px 7px; border: 1px solid #dfe3e7; margin-bottom: -1px; background: #fff; }
        .word-unit-focus { outline: 2px solid #dc3545; outline-offset: 3px; background: #fff3cd; }
        .pdf-page-shell { width: fit-content; max-width: 100%; margin: 0 auto 12px; padding: 8px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.16); }
        .pdf-page-shell canvas { display: block; max-width: 100%; height: auto; }
        .pdf-page-label { margin-bottom: 6px; color: #6c757d; font-size: 12px; }
        .pdf-text-context { max-width: 760px; margin: 0 auto; padding: 10px; background: #fff; font-size: 12px; line-height: 1.65; white-space: pre-wrap; overflow-wrap: anywhere; }
        .context-title { margin-bottom: 5px; color: #6c757d; font-weight: 650; }
        .pdf-text-context mark { background: #fff3cd; color: #842029; }
        .preview-empty { padding: 28px 12px; color: #6c757d; text-align: center; }
        @media (max-width: 1200px) {
            .workbench { grid-template-columns: 300px minmax(0, 1fr); }
            .word-reader-paper { padding: 26px 28px; }
        }
        @media (max-width: 900px) {
            .upload-grid, .change-grid, .source-grid { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .workbench { display: block; height: auto; }
            .queue { height: 560px; border-right: 0; border-bottom: 1px solid #dfe3e7; }
            .review { height: 1100px; }
            .change-side + .change-side, .source-pane + .source-pane { border-left: 0; border-top: 1px solid #dfe3e7; }
        }
    </style>
</head>
<body>
<main class="page-shell">
    <header class="topbar">
        <div><h1>校对之王</h1><p>按原文顺序发现参考新增、参考删除和内容修改。</p></div>
        <a class="btn btn-outline-secondary btn-sm" href="../../index.html">返回工具页</a>
    </header>

    <div id="workspaceMessage" class="alert alert-secondary py-2 mb-3">上传我的手册和参考手册后开始比对。</div>

    <section class="section">
        <div class="section-body">
            <div class="upload-grid">
                <div class="upload-side">
                    <div class="upload-title">我的手册</div>
                    <input id="myInput" class="form-control form-control-sm" type="file" accept=".docx,.pdf">
                    <div class="range-row"><input id="myStartPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 起始页"><input id="myEndPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 结束页"></div>
                    <div id="myStatus" class="manual-status">未上传</div>
                </div>
                <div class="upload-side">
                    <div class="upload-title">参考手册</div>
                    <input id="referenceInput" class="form-control form-control-sm" type="file" accept=".docx,.pdf">
                    <div class="range-row"><input id="referenceStartPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 起始页"><input id="referenceEndPage" class="form-control form-control-sm" type="number" min="1" placeholder="PDF 结束页"></div>
                    <div id="referenceStatus" class="manual-status">未上传</div>
                </div>
            </div>
            <div class="actions"><button id="compareButton" class="btn btn-primary btn-sm" type="button">开始比对</button><button id="exportButton" class="btn btn-outline-primary btn-sm" type="button" disabled>导出 Excel</button></div>
        </div>
    </section>

    <div id="summaryGrid" class="summary-grid"></div>

    <section class="workbench">
        <aside class="queue">
            <div class="queue-toolbar">
                <div id="filterBar" class="filter-bar">
                    <button class="filter-button active" data-filter="all" type="button">全部</button>
                    <button class="filter-button" data-filter="reference-added" type="button">参考新增</button>
                    <button class="filter-button" data-filter="reference-removed" type="button">参考删除</button>
                    <button class="filter-button" data-filter="modified" type="button">内容修改</button>
                    <button class="filter-button" data-filter="review" type="button">待确认</button>
                </div>
                <input id="eventSearch" class="form-control form-control-sm" type="search" placeholder="在修订事件中搜索">
                <div class="queue-meta"><span>修订待办</span><span id="resultCount"></span></div>
            </div>
            <div id="eventNavigation" class="event-navigation"><div id="eventSpacer"></div><div id="eventVisible" class="event-visible"></div></div>
        </aside>

        <section class="review">
            <div class="selection-head">
                <h2 id="selectionTitle">选择一项修订事件</h2>
                <p id="selectionReason">新增和删除排在前面；一致内容默认不进入待办。</p>
                <div id="tokenChanges" class="token-changes"></div>
            </div>
            <div class="change-grid">
                <div class="change-side"><div class="change-side-head"><span>我的手册完整原文</span><span id="myChangeLocation" class="change-location"></span></div><div id="myChangeText" class="change-text"><span class="missing-text">等待选择</span></div></div>
                <div class="change-side"><div class="change-side-head"><span>参考手册完整原文</span><span id="referenceChangeLocation" class="change-location"></span></div><div id="referenceChangeText" class="change-text"><span class="missing-text">等待选择</span></div></div>
            </div>
            <div class="source-grid">
                <section class="source-pane"><div class="source-title"><strong>我的手册原文</strong><span id="mySourceName">我的手册原文</span></div><div id="mySource" class="source-view"><div class="preview-empty">上传文件后显示原文。</div></div></section>
                <section class="source-pane"><div class="source-title"><strong>参考手册原文</strong><span id="referenceSourceName">参考手册原文</span></div><div id="referenceSource" class="source-view"><div class="preview-empty">上传文件后显示原文。</div></div></section>
            </div>
        </section>
    </section>
</main>

<script src="../../../libs/bootstrap.bundle.min.js"></script>
<script src="../../../libs/mammoth.min.js"></script>
<script src="../../../libs/pdf.min.js"></script>
<script src="../../../libs/xlsx-js-style.min.js"></script>
<script src="manual-reader.js"></script>
<script src="navigation.js"></script>
<script src="document-views.js"></script>
<script src="excel-report.js"></script>
<script src="workspace.js"></script>
<script src="main.js"></script>
</body>
</html>
