<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打工皇帝</title>
    <link rel="stylesheet" href="../libs/bootstrap.min.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body class="is-gated">
    <div class="pattern-gate" id="homePatternGate" role="dialog" aria-modal="true" aria-label="首页图案验证">
        <div class="pattern-gate-inner">
            <div class="pattern-board" id="homePatternBoard" aria-label="访问图案">
                <svg class="pattern-lines" aria-hidden="true">
                    <polyline id="homePatternPath" points=""></polyline>
                    <line id="homePatternTrail" hidden></line>
                </svg>
                <button type="button" class="pattern-dot" data-pattern-node="1" aria-label="图案点 1"></button>
                <button type="button" class="pattern-dot" data-pattern-node="2" aria-label="图案点 2"></button>
                <button type="button" class="pattern-dot" data-pattern-node="3" aria-label="图案点 3"></button>
                <button type="button" class="pattern-dot" data-pattern-node="4" aria-label="图案点 4"></button>
                <button type="button" class="pattern-dot" data-pattern-node="5" aria-label="图案点 5"></button>
                <button type="button" class="pattern-dot" data-pattern-node="6" aria-label="图案点 6"></button>
                <button type="button" class="pattern-dot" data-pattern-node="7" aria-label="图案点 7"></button>
                <button type="button" class="pattern-dot" data-pattern-node="8" aria-label="图案点 8"></button>
                <button type="button" class="pattern-dot" data-pattern-node="9" aria-label="图案点 9"></button>
            </div>
            <p class="visually-hidden" id="homePatternStatus" aria-live="polite"></p>
        </div>
    </div>

    <aside class="announcement-banner" id="announcementBanner" aria-label="首页公告" hidden inert>
        <a class="announcement-link" id="announcementLink">
            <span id="announcementMessage"></span>
            <span class="announcement-cta" id="announcementCta" hidden>参与项目 👉</span>
        </a>
    </aside>

    <div class="page-shell" inert>
        <header class="command-bar">
            <div class="mascot-status" title="恭喜发财">
                <img src="./assets/status-done.png" alt="">
                <span>皇帝，您又来了</span>
            </div>

            <div class="search-box">
                <label class="visually-hidden" for="searchInput">搜索工具</label>
                <input id="searchInput" type="search" placeholder="恭喜发财" autocomplete="off" spellcheck="false">
                <kbd aria-hidden="true">/</kbd>
            </div>

            <div class="category-switch" id="categorySwitch" data-default-category="light" role="group" aria-label="工具分类">
                <button type="button" class="category-button" data-category="all" aria-pressed="false">全部 <span data-category-count="all">0</span></button>
                <button type="button" class="category-button" data-category="heavy" aria-pressed="false">重型 <span data-category-count="heavy">0</span></button>
                <button type="button" class="category-button active" data-category="light" aria-pressed="true">轻型 <span data-category-count="light">0</span></button>
                <button type="button" class="category-button" data-category="automation" aria-pressed="false">自动化 <span data-category-count="automation">0</span></button>
            </div>

            <div class="external-actions">
                <a class="header-link" href="../jobskill/index.html" target="_blank" rel="noopener noreferrer" title="工作技能">技能</a>
                <a class="header-link" href="./developer.html" target="_blank" rel="noopener noreferrer" title="开发者入口">
                    <span class="header-symbol" aria-hidden="true">&lt;/&gt;</span>
                    <span>开发者</span>
                </a>
                <a class="header-link" href="./manuals.html" target="_blank" rel="noopener noreferrer" title="用户手册">用户手册</a>
                <a class="icon-button" href="https://github.com/luckymaomi/ohmyflight" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
                    <svg viewBox="0 0 16 16" aria-hidden="true">
                        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
                    </svg>
                </a>
            </div>
        </header>

        <main>
            <section aria-label="工具清单">
                <div class="tool-grid" id="toolGrid"></div>
            </section>

            <div id="emptyState" class="empty-state" hidden>没找到。换个词再搜一次。</div>
        </main>
    </div>

    <div class="imperial-overlay" id="imperialOverlay" aria-hidden="true">
        <img src="./assets/status-done.png" alt="">
    </div>

    <script src="../libs/bootstrap.bundle.min.js"></script>
    <script src="../site-visibility.js"></script>
    <script src="./home-pattern-gate-logic.js"></script>
    <script src="./home-pattern-gate.js"></script>
    <script src="./tools-data.js"></script>
    <script src="./tools-render.js"></script>
</body>
</html>
