<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者 · 打工皇帝</title>
    <link rel="stylesheet" href="../libs/bootstrap.min.css">
    <link rel="stylesheet" href="./developer.css">
</head>
<body>
    <div class="developer-shell">
        <header class="developer-bar">
            <a class="back-link" href="./index.html">返回</a>

            <nav class="nav nav-tabs developer-tabs" role="tablist" aria-label="开发者内容">
                <button class="nav-link active" id="skillsTab" data-bs-toggle="tab" data-bs-target="#skillsPane" type="button" role="tab" aria-controls="skillsPane" aria-selected="true">Skills</button>
                <button class="nav-link" id="commitsTab" data-bs-toggle="tab" data-bs-target="#commitsPane" type="button" role="tab" aria-controls="commitsPane" aria-selected="false">提交记录</button>
            </nav>

            <a class="github-link" href="https://github.com/luckymaomi/ohmyflight" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
                </svg>
            </a>
        </header>

        <main class="tab-content">
            <section class="tab-pane fade show active" id="skillsPane" role="tabpanel" aria-labelledby="skillsTab" tabindex="0">
                <div class="skills-list" id="developerSkills"></div>
            </section>

            <section class="tab-pane fade" id="commitsPane" role="tabpanel" aria-labelledby="commitsTab" tabindex="0">
                <div class="commit-meta" id="commitMeta"></div>
                <div class="commit-list" id="commitList"></div>
            </section>
        </main>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div class="toast align-items-center text-bg-dark border-0" id="copyToast" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="copyToastBody">已复制</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
            </div>
        </div>
    </div>

    <script src="../libs/bootstrap.bundle.min.js"></script>
    <script src="./skills-data.js"></script>
    <script src="./developer.js"></script>
</body>
</html>
